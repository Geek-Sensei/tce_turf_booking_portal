<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>College Turf Booking | Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

<div class="login-container">
    <h2>College Turf Booking</h2>

    <form id="loginForm">
        <input 
            type="email" 
            id="email" 
            placeholder="College Email ID" 
            required 
        />

        <input 
            type="password" 
            id="password" 
            placeholder="Password" 
            required 
        />

        <button type="submit">Login</button>
    </form>

    <p id="error-msg"></p>
</div>

<script src="login.js"></script>
</body>
</html>
