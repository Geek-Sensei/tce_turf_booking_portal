<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TCE Turf Booking</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="login-wrapper">
    <div class="card">
      <div class="header">
        <h1>TCE</h1>
        <p>Turf Booking Portal</p>
      </div>

      <div class="form-content">
        <form id="loginForm">
          <div class="field">
            <label for="roll">Roll Number</label>
            <input 
              type="text" 
              id="roll" 
              placeholder="21CS042" 
              autocomplete="off"
              required
              autofocus
            >
          </div>

          <button type="submit" class="submit-btn">Sign In</button>
        </form>
      </div>
    </div>

    <div class="footer-note">
      Use your college roll number • No password required (demo)
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
